<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}" prefix="og: http://ogp.me/ns#">
{{ partial "head.html" . }}

<body>
  {{ partial "header.html" . }}
  <div class="container" data-testid="error-container">

    <div class="main-content-section" data-testid="error-content-section">
    <main id="main-content" data-testid="error-main">
      <div class="error-page" data-testid="error-page">
        <h1 class="error-title" data-testid="error-title">404</h1>
        <p class="error-message" data-testid="error-message">Page not found</p>
        <p><a href="{{ .Site.LanguagePrefix }}/" class="post-title-link" data-testid="error-home-link">Go Home</a></p>
      </div>
    </main>

    {{ partial "footer.html" . }}
    </div>
  </div>

  {{ partial "scripts.html" . }}
</body>

</html>
