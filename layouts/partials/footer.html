<footer class="site-footer" data-testid="site-footer">
  <p data-testid="footer-text">
    &copy; {{ now.Year }}{{ with .Site.Params.author.name }} {{ . }}{{ end }}. All rights reserved.
    {{ if .Site.Params.footerLinks }}
    <span class="footer-sep" data-testid="footer-sep">·</span>
    {{ range .Site.Params.footerLinks }}
    <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" data-testid="footer-link-{{ .name | urlize }}">{{ .name }}</a>
    {{ end }}
    {{ end }}
  </p>
</footer>
<div id="copy-announcement" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<button id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top" data-testid="back-to-top" hidden>
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>
