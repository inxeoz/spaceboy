{{ $curLanguageName := .Site.Language.LanguageName }}
<nav class="flex items-center justify-between py-4">
  <div class="flex items-center gap-4">
    <a href="{{ .Site.LanguagePrefix }}/" class="site-title">{{ or .Site.Params.headTitle .Site.Params.author.name }}</a>
  </div>
  
  <div class="flex items-center gap-6">
    <button id="theme-toggle" onclick="toggleTheme()" class="theme-toggle">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
      </svg>
    </button>

    {{ range .Site.Params.socials }}
    <a href="{{ .link }}" target="_blank" class="nav-link">{{ .name }}</a>
    {{ end }}

    {{ range .Site.Languages -}} {{ if ne .LanguageName $curLanguageName }}
    <a href="/{{ .Lang }}/" class="nav-link">{{ .LanguageName }}</a>
    {{ end }} {{ end }}
  </div>
</nav>
<div class="border-b"></div>
