{{ $related := (where site.RegularPages "Type" "in" site.Params.mainSections).Related . | first 3 }}
{{ with $related }}
<div class="related-content" data-testid="related-posts">
  <h3 data-testid="related-posts-title">Related Posts</h3>
  <ul data-testid="related-posts-list">
    {{ range . }}
    <li data-testid="related-post-item"><a href="{{ .RelPermalink }}" data-testid="related-post-link">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</div>
{{ end }}
