<div id="search-modal" class="search-modal" aria-modal="true" role="dialog"
     aria-label="Search" hidden data-testid="search-modal">
  <div class="search-backdrop" id="search-backdrop"></div>
  <div class="search-panel" data-testid="search-panel">
    <div class="search-header">
      <div class="search-input-wrap">
        <svg class="search-icon-inline" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search-input" class="search-input" type="search"
               placeholder="Search posts, tags, dates…" autocomplete="off"
               spellcheck="false"
               aria-label="Search posts" data-testid="search-input" />
      </div>
      <button id="search-close" class="search-close" aria-label="Close search"
              data-testid="search-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div id="search-results" class="search-results" role="listbox"
         aria-label="Search results" data-testid="search-results">
      <p class="search-hint" data-testid="search-hint">Type to search…</p>
    </div>
    <div class="search-footer" aria-hidden="true">
      <span class="search-key"><kbd>↑↓</kbd> navigate</span>
      <span class="search-key"><kbd>↵</kbd> open</span>
      <span class="search-key"><kbd>Esc</kbd> close</span>
    </div>
  </div>
</div>
