{{ if and .Site.Params.lazyImage (not .IsHome) }}
<script src="{{ .Site.Params.staticPrefix }}{{ "js/lazyload.min.js" | relURL }}"></script>
<script>
  new LazyLoad({ container: document.getElementById('article') });
</script>
{{ end }}

<script>
(function() {
  const root = document.documentElement;
  const themeKey = 'theme';
  const copyIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const copiedIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  window.toggleTheme = () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem(themeKey, isDark ? 'light' : 'dark');
    updateThemeIcons();
  };

  const updateThemeIcons = () => {
    const btn = document.getElementById('theme-toggle');
    if (!btn) return;
    const moonIcon = btn.querySelector('.moon-icon');
    const sunIcon = btn.querySelector('.sun-icon');
    const isDark = root.getAttribute('data-theme') === 'dark';
    if (moonIcon && sunIcon) {
      moonIcon.style.display = isDark ? 'none' : 'inline';
      sunIcon.style.display = isDark ? 'inline' : 'none';
    }
  };

  window.toggleLayout = () => {
    const isList = document.body.classList.contains('list-layout');
    document.body.classList.toggle('list-layout', !isList);
    localStorage.setItem('layout', !isList ? 'list' : 'card');
    updateLayoutIcons();
  };

  const updateLayoutIcons = () => {
    const btn = document.getElementById('layout-toggle');
    if (!btn) return;
    const gridIcon = btn.querySelector('.grid-icon');
    const listIcon = btn.querySelector('.list-icon');
    const isList = document.body.classList.contains('list-layout');
    if (gridIcon && listIcon) {
      gridIcon.style.display = isList ? 'none' : 'inline';
      listIcon.style.display = isList ? 'inline' : 'none';
    }
  };

  const savedLayout = localStorage.getItem('layout');
  if (savedLayout === 'list') document.body.classList.add('list-layout');
  updateLayoutIcons();

  // Load saved theme or detect system preference
  const savedTheme = localStorage.getItem(themeKey);
  if (savedTheme) {
    root.setAttribute('data-theme', savedTheme);
  } else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  }
  updateThemeIcons();

  // Code blocks
  document.querySelectorAll('.post-content pre').forEach(pre => {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    wrapper.innerHTML = '<button class="copy-code-btn" aria-label="Copy code"><span class="copy-icon">' + copyIcon + '</span><span class="copied-icon" style="display:none;">' + copiedIcon + '</span></button>';
    pre.before(wrapper);
    wrapper.appendChild(pre);

    wrapper.addEventListener('click', e => {
      if (!e.target.closest('.copy-code-btn')) {
        wrapper.classList.remove('clicked');
      }
    });
    wrapper.addEventListener('mouseenter', () => wrapper.classList.remove('clicked'));
    wrapper.addEventListener('mouseleave', () => wrapper.classList.remove('clicked'));
  });

  // Copy handler
  document.addEventListener('click', e => {
    const btn = e.target.closest('.copy-code-btn');
    if (!btn) return;
    const code = btn.closest('.code-block-wrapper').querySelector('code, pre');
    if (!code) return;

    navigator.clipboard.writeText(code.textContent).then(() => {
      const [copy, copied] = [btn.querySelector('.copy-icon'), btn.querySelector('.copied-icon')];
      copy.style.display = 'none';
      copied.style.display = 'inline';
      btn.classList.add('copied');
      setTimeout(() => {
        copy.style.display = 'inline';
        copied.style.display = 'none';
        btn.classList.remove('copied');
      }, 2000);
    });
  });

  // Image modal
  const modal = document.createElement('div');
  modal.className = 'image-modal';
  modal.innerHTML = '<div class="image-modal-content"><img src="" alt=""><span class="image-modal-close">&times;</span></div>';
  document.body.appendChild(modal);

  const modalImg = modal.querySelector('img');
  let scale = 1, translateX = 0, translateY = 0, isDrag = false, lastX, lastY;

  const update = () => modalImg.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
  const pos = e => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };

  const startDrag = e => {
    if (e.target !== modalImg) return;
    isDrag = true;
    const p = pos(e);
    lastX = p.x;
    lastY = p.y;
    modalImg.style.cursor = 'grabbing';
    e.preventDefault();
  };

  modal.addEventListener('mousedown', startDrag);
  modal.addEventListener('touchstart', startDrag, { passive: false });

  const move = e => {
    if (!isDrag) return;
    e.preventDefault();
    const p = pos(e);
    translateX += p.x - lastX;
    translateY += p.y - lastY;
    lastX = p.x;
    lastY = p.y;
    update();
  };

  modal.addEventListener('mousemove', move);
  modal.addEventListener('touchmove', move, { passive: false });
  modal.addEventListener('mouseup', () => { isDrag = false; modalImg.style.cursor = 'grab'; });
  modal.addEventListener('touchend', () => isDrag = false);
  modal.addEventListener('mouseleave', () => isDrag = false);

  modal.addEventListener('click', e => {
    if (e.target !== modal && e.target !== modalImg && !e.target.classList.contains('image-modal-close')) return;
    modal.classList.remove('active');
    scale = 1; translateX = 0; translateY = 0;
    update();
  });

  document.querySelectorAll('.post-content img').forEach(img => {
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', () => { modalImg.src = img.src; scale = 1; translateX = 0; translateY = 0; update(); modal.classList.add('active'); });
  });

  // Mermaid initialization
  document.addEventListener('DOMContentLoaded', () => {
    const decodeHtml = (html) => {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    };
    document.querySelectorAll('.mermaid').forEach(el => {
      if (el.innerHTML.trim()) {
        el.innerHTML = decodeHtml(el.innerHTML.trim());
      }
    });
    mermaid.initialize({ startOnLoad: true, theme: document.documentElement.hasAttribute('data-theme') ? 'dark' : 'default' });
  });

})();
</script>
