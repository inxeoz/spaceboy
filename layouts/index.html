<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" prefix="og: http://ogp.me/ns#">
{{ partial "head.html" . }}

<body>
  <div class="container">
    {{ partial "header.html" . }}
    <main>
      {{ partial "post-list.html" (dict "Pages" (where site.RegularPages "Type" "in" site.Params.mainSections) "IsHome" .IsHome "Site" .Site) }}
    </main>
    {{ partial "footer.html" . }}
  </div>

  {{ partial "scripts.html" . }}
</body>

</html>
